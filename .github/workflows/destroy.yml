name: Destroy EC2

on:
workflow_dispatch:
inputs:
environment:
description: "Choose environment"
required: true
default: dev
type: choice
options:
- dev
- qa
- prod
- all
base_name:
description: "Base server name"
required: true
default: my-server

jobs:
destroy:
runs-on: ubuntu-latest

```
strategy:
  matrix:
    env: [dev, qa, prod]

steps:
  - name: Checkout code
    uses: actions/checkout@v3

  - name: Configure AWS Credentials
    uses: aws-actions/configure-aws-credentials@v4
    with:
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      aws-region: ap-south-1

  - name: Setup Terraform
    uses: hashicorp/setup-terraform@v2

  - name: Terraform Init
    if: ${{ github.event.inputs.environment == 'all' || github.event.inputs.environment == matrix.env }}
    working-directory: env/${{ matrix.env }}
    run: terraform init

  - name: Terraform Plan Destroy
    if: ${{ github.event.inputs.environment == 'all' || github.event.inputs.environment == matrix.env }}
    working-directory: env/${{ matrix.env }}
    run: |
      echo "Destroy plan for ${{ matrix.env }}"
      terraform plan -destroy -var="base_name=${{ github.event.inputs.base_name }}"

  - name: Terraform Destroy
    if: ${{ github.event.inputs.environment == 'all' || github.event.inputs.environment == matrix.env }}
    working-directory: env/${{ matrix.env }}
    run: |
      echo "Destroying ${{ matrix.env }}"
      terraform destroy -auto-approve -var="base_name=${{ github.event.inputs.base_name }}"
```
