name: Destroy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Choose environment to destroy"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - qa
          - prod
          - all

jobs:
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Destroy Selected Environment(s)
        run: |
          if [ "${{ github.event.inputs.environment }}" == "all" ]; then
            ENV_LIST="dev qa prod"
          else
            ENV_LIST="${{ github.event.inputs.environment }}"
          fi

          for ENV in $ENV_LIST; do
            echo "=============================="
            echo "Destroying environment: $ENV"
            echo "=============================="

            terraform workspace select $ENV || {
              echo "Workspace $ENV not found, skipping..."
              continue
            }

            terraform destroy -auto-approve \
              -var="environment=$ENV"
          done